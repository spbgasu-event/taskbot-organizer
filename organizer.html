<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Панель организатора</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geologica:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f0ede8; --surface: #fff; --surface2: #f7f4f0;
    --accent: #1a1a2e; --red: #e63946; --green: #2a9d8f;
    --text: #1a1a2e; --muted: #8a8a9a; --border: #e0dbd4;
    --yellow: #e9c46a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Geologica', sans-serif; min-height: 100vh; }

  /* HEADER */
  .header { background: var(--accent); color: #fff; padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 3px; }
  .logo span { color: var(--red); }
  .header-right { display: flex; gap: 24px; align-items: center; }
  .stat-pill { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 6px 14px; font-size: 12px; font-weight: 500; }
  .stat-pill b { color: var(--yellow); }

  /* LAYOUT */
  .layout { display: flex; min-height: calc(100vh - 68px); }

  /* SIDEBAR */
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 0; flex-shrink: 0; position: sticky; top: 68px; height: calc(100vh - 68px); overflow-y: auto; }
  .sidebar-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 0 20px 12px; }
  .dept-btn { width: 100%; padding: 12px 20px; background: none; border: none; text-align: left; cursor: pointer; font-family: 'Geologica', sans-serif; font-size: 14px; font-weight: 500; color: var(--text); display: flex; align-items: center; justify-content: space-between; transition: all 0.15s; border-left: 3px solid transparent; }
  .dept-btn:hover { background: var(--surface2); }
  .dept-btn.active { background: var(--surface2); border-left-color: var(--accent); font-weight: 700; }
  .dept-btn .count { background: var(--accent); color: #fff; border-radius: 100px; font-size: 10px; font-weight: 700; padding: 2px 8px; }
  .dept-btn.active .count { background: var(--red); }
  .sidebar-sep { height: 1px; background: var(--border); margin: 12px 20px; }

  /* MAIN */
  .main { flex: 1; padding: 32px; overflow-y: auto; }
  .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; margin-bottom: 8px; }
  .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 32px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; line-height: 1; }
  .stat-num.red { color: var(--red); }
  .stat-num.green { color: var(--green); }

  /* TASK CARDS */
  .tasks-grid { display: flex; flex-direction: column; gap: 12px; }
  .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: box-shadow 0.2s; }
  .task-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .task-header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
  .task-header:hover { background: var(--surface2); }
  .task-title-wrap { display: flex; align-items: center; gap: 12px; }
  .task-title { font-weight: 700; font-size: 15px; }
  .task-dept-tag { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 100px; background: rgba(26,26,46,0.08); color: var(--accent); }
  .task-meta { display: flex; align-items: center; gap: 12px; }
  .task-slots { font-size: 12px; color: var(--muted); font-weight: 500; }
  .progress-mini { width: 80px; height: 5px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 100px; transition: width 0.4s; }
  .progress-fill.full { background: var(--green); }
  .chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* TASK BODY */
  .task-body { border-top: 1px solid var(--border); display: none; }
  .task-body.open { display: block; }
  .task-info { padding: 16px 20px; background: var(--surface2); border-bottom: 1px solid var(--border); }
  .task-desc { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
  .dates-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .date-chip { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); }
  .date-chip.check { color: var(--accent); }
  .date-chip.deadline { color: var(--red); border-color: rgba(230,57,70,0.3); background: rgba(230,57,70,0.05); }

  /* PARTICIPANTS TABLE */
  .participants-wrap { padding: 0; }
  .p-table { width: 100%; border-collapse: collapse; }
  .p-table th { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); padding: 10px 20px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface2); }
  .p-table td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .p-table tr:last-child td { border-bottom: none; }
  .p-table tr:hover td { background: var(--surface2); }
  .tg-link { color: var(--accent); font-weight: 600; text-decoration: none; }
  .tg-link:hover { color: var(--red); }

  /* CHECKBOXES */
  .check-cell { display: flex; align-items: center; gap: 6px; }
  .check-box { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; font-size: 12px; background: var(--surface); }
  .check-box.checked { background: var(--green); border-color: var(--green); color: white; }
  .check-box.checked::after { content: "✓"; }
  .check-box:not(.checked):hover { border-color: var(--green); }

  /* EMPTY */
  .empty { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }

  /* LOADER */
  .loader { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

  /* SAVE BTN */
  .save-btn { position: fixed; bottom: 24px; right: 24px; background: var(--accent); color: #fff; border: none; border-radius: 100px; padding: 14px 28px; font-family: 'Geologica', sans-serif; font-weight: 700; font-size: 13px; cursor: pointer; display: none; align-items: center; gap: 8px; box-shadow: 0 8px 24px rgba(26,26,46,0.3); transition: all 0.2s; z-index: 200; }
  .save-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(26,26,46,0.4); }
  .save-btn.visible { display: flex; }

  @media (max-width: 768px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; height: auto; position: static; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Студсовет <span>·</span> Организатор</div>
  <div class="header-right">
    <div class="stat-pill">Задач: <b id="h-tasks">—</b></div>
    <div class="stat-pill">Участников: <b id="h-participants">—</b></div>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">Отделы</div>
    <button class="dept-btn active" data-dept="all" onclick="filterDept('all', this)">
      Все отделы <span class="count" id="cnt-all">0</span>
    </button>
    <div class="sidebar-sep"></div>
    <div id="dept-list"></div>
  </div>

  <div class="main">
    <div class="page-title">Панель организатора</div>
    <div class="page-sub" id="page-sub">Загружаем данные...</div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Всего задач</div><div class="stat-num" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Заполнены</div><div class="stat-num green" id="s-full">—</div></div>
      <div class="stat-card"><div class="stat-label">Открыты</div><div class="stat-num" id="s-open">—</div></div>
      <div class="stat-card"><div class="stat-label">Участников</div><div class="stat-num red" id="s-parts">—</div></div>
    </div>

    <div id="tasks-container"><div class="loader">Загружаем задачи...</div></div>
  </div>
</div>

<button class="save-btn" id="save-btn" onclick="saveChecklist()">💾 Сохранить изменения</button>

<script>
const API = "https://taskbot-backend-srm4.onrender.com";
let allTasks = [];
let allParticipants = {};
let checklist = {};
let pendingChanges = {};
let currentDept = "all";

async function loadAll() {
  try {
    const [tasksRes, checkRes] = await Promise.all([
      fetch(`${API}/tasks-all`),
      fetch(`${API}/checklist`)
    ]);
    const tasksData = await tasksRes.json();
    const checkData = await checkRes.json();

    allTasks = tasksData.tasks || [];

    // Индексируем чеклист
    (checkData.checklist || []).forEach(row => {
      const key = `${row.task_id}_${row.participant_name}`;
      checklist[key] = row;
    });

    // Загружаем участников для каждой задачи
    await Promise.all(allTasks.map(async t => {
      const res = await fetch(`${API}/task/${t.task_id}/participants`);
      const d = await res.json();
      allParticipants[t.task_id] = d.participants || [];
    }));

    renderAll();
  } catch(e) {
    document.getElementById('tasks-container').innerHTML =
      `<div class="empty">⚠️ Не удалось подключиться к серверу.<br>Убедись что бэкенд запущен.</div>`;
  }
}

function renderAll() {
  const tasks = currentDept === "all"
    ? allTasks
    : allTasks.filter(t => t.department === currentDept);

  // Шапка статистика
  const totalParts = Object.values(allParticipants).reduce((s, p) => s + p.length, 0);
  const full = allTasks.filter(t => parseInt(t.current_participants) >= parseInt(t.max_participants)).length;
  document.getElementById('s-total').textContent = allTasks.length;
  document.getElementById('s-full').textContent = full;
  document.getElementById('s-open').textContent = allTasks.length - full;
  document.getElementById('s-parts').textContent = totalParts;
  document.getElementById('h-tasks').textContent = allTasks.length;
  document.getElementById('h-participants').textContent = totalParts;
  document.getElementById('page-sub').textContent =
    currentDept === "all" ? `Все отделы · ${tasks.length} задач` : `${currentDept} · ${tasks.length} задач`;

  // Сайдбар отделы
  const depts = [...new Set(allTasks.map(t => t.department))];
  document.getElementById('cnt-all').textContent = allTasks.length;
  document.getElementById('dept-list').innerHTML = depts.map(d => {
    const cnt = allTasks.filter(t => t.department === d).length;
    return `<button class="dept-btn ${currentDept === d ? 'active' : ''}" data-dept="${d}" onclick="filterDept('${d}', this)">
      ${d} <span class="count">${cnt}</span>
    </button>`;
  }).join('');

  // Задачи
  if (tasks.length === 0) {
    document.getElementById('tasks-container').innerHTML = '<div class="empty">Нет задач в этом отделе</div>';
    return;
  }

  document.getElementById('tasks-container').innerHTML = tasks.map(t => {
    const parts = allParticipants[t.task_id] || [];
    const cur = parseInt(t.current_participants) || 0;
    const max = parseInt(t.max_participants) || 1;
    const pct = Math.round((cur / max) * 100);
    const isFull = cur >= max;

    const partsHtml = parts.length === 0
      ? `<div class="empty">Участников пока нет</div>`
      : `<table class="p-table">
          <thead><tr>
            <th>Имя</th><th>Telegram</th><th>Дата записи</th>
            <th>Проверка 1</th><th>Проверка 2</th><th>Финал</th>
          </tr></thead>
          <tbody>
            ${parts.map(p => {
              const key = `${t.task_id}_${p.name}`;
              const row = checklist[key] || {};
              return `<tr>
                <td><b>${p.name}</b></td>
                <td><a class="tg-link" href="https://t.me/${p.telegram_username}" target="_blank">@${p.telegram_username}</a></td>
                <td style="color:var(--muted)">${p.registered_at || '—'}</td>
                <td><div class="check-cell">
                  <div class="check-box ${row.check_date_1_done === 'TRUE' ? 'checked' : ''}"
                    onclick="toggleCheck('${key}', 'check_date_1_done', this)"></div>
                </div></td>
                <td><div class="check-cell">
                  <div class="check-box ${row.check_date_2_done === 'TRUE' ? 'checked' : ''}"
                    onclick="toggleCheck('${key}', 'check_date_2_done', this)"></div>
                </div></td>
                <td><div class="check-cell">
                  <div class="check-box ${row.final_done === 'TRUE' ? 'checked' : ''}"
                    onclick="toggleCheck('${key}', 'final_done', this)"></div>
                </div></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;

    return `<div class="task-card">
      <div class="task-header" onclick="toggleTask(${t.task_id})">
        <div class="task-title-wrap">
          <div class="task-title">${t.title}</div>
          <div class="task-dept-tag">${t.department}</div>
        </div>
        <div class="task-meta">
          <div class="task-slots">${cur} / ${max}</div>
          <div class="progress-mini"><div class="progress-fill ${isFull ? 'full' : ''}" style="width:${pct}%"></div></div>
          <div class="chevron" id="chev-${t.task_id}">▼</div>
        </div>
      </div>
      <div class="task-body" id="body-${t.task_id}">
        <div class="task-info">
          <div class="task-desc">${t.description || 'Нет описания'}</div>
          <div class="dates-row">
            <div class="date-chip check">📅 Проверка 1: ${t.check_date_1 || '—'}</div>
            <div class="date-chip check">📅 Проверка 2: ${t.check_date_2 || '—'}</div>
            <div class="date-chip deadline">🏁 Дедлайн: ${t.deadline || '—'}</div>
          </div>
        </div>
        <div class="participants-wrap">${partsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleTask(id) {
  const body = document.getElementById(`body-${id}`);
  const chev = document.getElementById(`chev-${id}`);
  body.classList.toggle('open');
  chev.classList.toggle('open');
}

function filterDept(dept, btn) {
  currentDept = dept;
  document.querySelectorAll('.dept-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function toggleCheck(key, field, el) {
  el.classList.toggle('checked');
  const isChecked = el.classList.contains('checked');
  if (!checklist[key]) checklist[key] = {};
  checklist[key][field] = isChecked ? 'TRUE' : 'FALSE';
  if (!pendingChanges[key]) pendingChanges[key] = {};
  pendingChanges[key][field] = isChecked ? 'TRUE' : 'FALSE';
  document.getElementById('save-btn').classList.add('visible');
}

async function saveChecklist() {
  const btn = document.getElementById('save-btn');
  btn.textContent = '⏳ Сохраняем...';
  try {
    const res = await fetch(`${API}/checklist/update`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ updates: pendingChanges })
    });
    if (res.ok) {
      pendingChanges = {};
      btn.textContent = '✅ Сохранено!';
      setTimeout(() => { btn.classList.remove('visible'); btn.textContent = '💾 Сохранить изменения'; }, 2000);
    } else {
      btn.textContent = '❌ Ошибка, попробуй снова';
      setTimeout(() => { btn.textContent = '💾 Сохранить изменения'; }, 2000);
    }
  } catch {
    btn.textContent = '❌ Сервер недоступен';
    setTimeout(() => { btn.textContent = '💾 Сохранить изменения'; }, 2000);
  }
}

loadAll();
</script>
</body>
</html>
